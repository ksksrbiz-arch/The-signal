<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Signal Lost | THE SIGNAL</title>
  <meta name="robots" content="noindex">

  <!-- Favicon (matches main site) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230c0b09'/><line x1='16' y1='6' x2='16' y2='26' stroke='%23c9a84c' stroke-width='2'/><circle cx='16' cy='16' r='3.5' stroke='%23c9a84c' stroke-width='1.5' fill='none'/><circle cx='16' cy='16' r='1' fill='%23c9a84c'/></svg>">

  <!-- Fonts (matches main site) -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,600,700&f[]=general-sans@300,400,500,600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0b09;
      --text: #d4cfc4;
      --text-dim: #8a8578;
      --accent: #c9a84c;
      --accent-hover: #dbb85c;
      --surface: #16140f;
      --border: #2a261e;
      --font-display: 'Zodiak', Georgia, 'Times New Roman', serif;
      --font-body: 'General Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .error-page {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: 8rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.04em;
      opacity: 0.85;
    }

    .error-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 0.75rem;
    }

    .error-message {
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--text-dim);
      margin: 1.5rem 0 2.5rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .link:active { transform: scale(0.97); }

    .link-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .link-primary:hover {
      background: var(--accent-hover);
    }

    .link-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .link-secondary:hover {
      border-color: var(--accent);
      background: rgba(201, 168, 76, 0.08);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 2rem auto 0;
    }

    .footer-note {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <h1 class="error-code">404</h1>
    <p class="error-label">Signal Lost</p>
    <p class="error-message">The transmission you're looking for doesn't exist or has been moved.</p>
    <div class="links">
      <a href="/" class="link link-primary">Return Home</a>
      <a href="/the-signal.pdf" class="link link-secondary">Download PDF</a>
    </div>
    <div class="divider"></div>
    <p class="footer-note">THE SIGNAL · 1COMMERCE LLC</p>
  </main>
</body>
</html>
