<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found - The Signal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --text: #1a1a2e;
      --accent: #0f3460;
      --accent-hover: #16498a;
      --border: #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-page {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .error-message {
      font-size: 1.25rem;
      margin: 1rem 0 2rem;
      color: #64748b;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 24px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .link:active { transform: scale(0.97); }

    .link-primary {
      background: var(--accent);
      color: #fff;
    }

    .link-primary:hover { background: var(--accent-hover); }

    .link-secondary {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .link-secondary:hover {
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <h1 class="error-code">404</h1>
    <p class="error-message">The page you are looking for does not exist.</p>
    <div class="links">
      <a href="/" class="link link-primary">Go to homepage</a>
      <a href="/the-signal.pdf" class="link link-secondary">Download PDF</a>
    </div>
  </main>
</body>
</html>
