# Netlify Configuration for The Signal
# Static HTML/CSS/JS site with serverless functions
# NOT a Next.js site

[build]
  publish = "."
  functions = "functions"

# Security & Performance Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Security
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

    # Security (CSP)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://assets.mailerlite.com; style-src 'self' 'unsafe-inline' https://api.fontshare.com https://fonts.googleapis.com; font-src 'self' https://api.fontshare.com https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://assets.mailerlite.com https://api.rss2json.com; frame-ancestors 'none';"

    # Performance
    X-DNS-Prefetch-Control = "on"

# Static asset caching
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages - no cache to ensure fresh content after deploys
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker - never cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Redirects — legacy paths from th3signal and common URL guesses
[[redirects]]
  from = "/blog"
  to = "/fieldnotes"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/fieldnotes/:splat"
  status = 301

[[redirects]]
  from = "/posts"
  to = "/archive"
  status = 301

[[redirects]]
  from = "/posts/*"
  to = "/archive/:splat"
  status = 301

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
