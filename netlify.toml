[build]
  publish = "."
  command = "echo 'Static site — no build step needed'"

[build.environment]
  NODE_ENV = "production"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Configure checklinks to not fail on external URLs
# (Netlify's sandboxed build env has SSL cert issues with preconnects,
#  and some external sites block crawlers with 403s)
[[plugins]]
  package = "netlify-plugin-checklinks"
  [plugins.inputs]
    checkExternal = false
    pretty = true

# Sitemap generation (auto-generates sitemap.xml from all HTML files)
[[plugins]]
  package = "@netlify/plugin-sitemap"
  [plugins.inputs]
    buildDir = "."
    prettyURLs = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
