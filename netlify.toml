# ═══════════════════════════════════════════════════════════════
# Netlify Configuration for The Signal
# Static HTML/CSS/JS site with serverless functions
# 1Commerce Solutions LLC · https://1commercesolutions.com
# ═══════════════════════════════════════════════════════════════

[build]
  publish = "."
  functions = "functions"

# ── Security & Performance Headers ─────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Security
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

    # Security (CSP)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://assets.mailerlite.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://assets.mailerlite.com https://api.rss2json.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'none';"

    # Performance
    X-DNS-Prefetch-Control = "on"

# Static asset caching — short fresh window + stale-while-revalidate.
#
# We deliberately avoid `immutable` on unversioned filenames. `immutable`
# locks a client to one specific response body for max-age (previously a
# year) with no revalidation, meaning any CSS/JS bug ships into a cache
# that is effectively un-bustable without changing the URL itself.
#
# The pattern below serves from cache for 1 hour (fast repeat visits),
# then serves the stale copy for up to 1 day while revalidating in the
# background. In practice deploys propagate to all clients within ~1h,
# with no perceived latency because the stale copy is served instantly.
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# HTML pages - no cache to ensure fresh content after deploys
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker - never cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Canonical domain redirect — send old Netlify subdomain to production domain.
# force=true ensures this fires even if a matching static file exists.
[[redirects]]
  from = "https://signal01.netlify.app/*"
  to = "https://1commercesolutions.com/:splat"
  status = 301
  force = true

# API proxy — frontend calls /api/news, rewritten to the actual function path.
# status=200 makes this a rewrite (URL stays /api/news), not a visible 301.
[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

# Block public access to internal documentation and setup scripts.
# force=true overrides static file serving so Netlify returns 404
# instead of serving the raw file content.
[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.bat"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.py"
  to = "/404.html"
  status = 404
  force = true

# Redirects — legacy paths from th3signal and common URL guesses
# Point directly to trailing-slash URLs to avoid redirect chains.
[[redirects]]
  from = "/blog"
  to = "/fieldnotes/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/fieldnotes/:splat"
  status = 301

[[redirects]]
  from = "/posts"
  to = "/archive/"
  status = 301

[[redirects]]
  from = "/posts/*"
  to = "/archive/:splat"
  status = 301

# ── SEO: Trailing-slash normalization for section indexes ───────
# Ensures /archive resolves the same as /archive/ (prevents split signals)
[[redirects]]
  from = "/archive"
  to = "/archive/"
  status = 301

[[redirects]]
  from = "/fieldnotes"
  to = "/fieldnotes/"
  status = 301

[[redirects]]
  from = "/builds"
  to = "/builds/"
  status = 301

[[redirects]]
  from = "/news"
  to = "/news/"
  status = 301

[[redirects]]
  from = "/videos"
  to = "/videos/"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
