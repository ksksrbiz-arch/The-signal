[build]
  publish = "."
  command = "echo 'Static site — no build step needed'"

[build.environment]
  NODE_ENV = "production"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Configure checklinks — skip external preconnects and URLs that fail
# in Netlify's sandboxed build environment (SSL cert mismatches, 403s)
[[plugins]]
  package = "netlify-plugin-checklinks"
  [plugins.inputs]
    checkExternal = false
    pretty = true
    skipPatterns = [
      "https://fonts.googleapis.com",
      "https://fonts.gstatic.com",
      "https://api.fontshare.com",
      "https://www.perplexity.ai"
    ]

# Sitemap generation (auto-generates sitemap.xml from all HTML files)
[[plugins]]
  package = "@netlify/plugin-sitemap"
  [plugins.inputs]
    buildDir = "."
    prettyURLs = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
