[build]
  publish = "."
  command = "echo done"

# Skip installing problematic plugins
[build.environment]
  NPM_FLAGS = "--ignore-scripts"
  NODE_ENV = "production"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
