[build]
  publish = "."

# Convenience redirects to the PDF
[[redirects]]
  from = "/pdf"
  to = "/the-signal.pdf"
  status = 200

[[redirects]]
  from = "/download"
  to = "/the-signal.pdf"
  status = 200

[[redirects]]
  from = "/document"
  to = "/the-signal.pdf"
  status = 301

[[redirects]]
  from = "/document.pdf"
  to = "/the-signal.pdf"
  status = 301

# Security and caching headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; object-src 'self'; frame-src 'self'"

# Cache PDF aggressively (changes rarely)
[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# HTML should always revalidate for fresh deploys
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
